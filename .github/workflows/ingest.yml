name: Ingest

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-v1

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium

      - name: Install Playwright OS deps (when cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      - name: Run fetcher
        run: python fetch.py

      - name: Run inference pass
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python infer.py

      - name: Render OSINT dashboard
        run: python dashboard.py

      - name: Slice regions
        run: python region_slice.py

      - name: Distill OSINT platform content
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python osint_content.py

      - name: Render HTML dashboard
        run: python render_html.py

      - name: Commit and push
        run: |
          git config user.name "Yepisyeni Türkiye"
          git config user.email "yepisyeniturkiye@gmail.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "trihourly: $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "no changes to commit"
          fi
